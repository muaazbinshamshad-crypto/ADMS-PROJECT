<!DOCTYPE html>
<html>
<head>
  <title>CareerSync Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="navbar">
    <strong>CareerSync</strong>
    <div>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </div>
  </div>

  <div class="container" style="max-width: 500px;">
    <h1>Register</h1>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <select id="role">
      <option value="student">Student</option>
      <option value="admin">Admin</option>
      <option value="recruiter">Recruiter</option>
    </select>
    <button onclick="registerUser()">Create Account</button>
    <p id="message" class="message"></p>
  </div>

<script>
async function registerUser() {
  const message = document.getElementById("message");
  message.innerText = "Creating account...";
  message.className = "message";

  const body = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    password: document.getElementById("password").value.trim(),
    role: document.getElementById("role").value
  };

  try {
    const response = await fetch("http://localhost:5000/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    const data = await response.json();

    if (!response.ok) {
      message.innerText = data.message || "Registration failed";
      message.className = "message error";
      return;
    }

    message.innerText = "Account created. Now login.";
    message.className = "message success";
  } catch (error) {
    message.innerText = "Backend not running. Start backend first.";
    message.className = "message error";
  }
}
</script>
</body>
</html>
